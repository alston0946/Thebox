name: box-breakout-scan

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

jobs:
  run-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    strategy:
      fail-fast: false
      matrix:
        batch_index: [0, 1]

    env:
      BATCH_TOTAL: 2
      BATCH_INDEX: ${{ matrix.batch_index }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Show Python version
        run: python --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare output directory
        run: mkdir -p output

      - name: Run scanner for this batch
        run: python box_breakout_scan.py

      - name: Upload batch outputs
        uses: actions/upload-artifact@v4
        with:
          name: box-breakout-batch-${{ matrix.batch_index }}
          path: |
            output/box_breakout_batch_${{ matrix.batch_index }}.csv
            output/box_breakout_failed_batch_${{ matrix.batch_index }}.csv
            output/summary_batch_${{ matrix.batch_index }}.txt

  merge-results:
    needs: run-scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded_artifacts

      - name: Merge outputs
        run: |
          python - <<'PY'
          import os
          import glob
          import pandas as pd

          os.makedirs("output", exist_ok=True)

          batch_files = glob.glob("downloaded_artifacts/**/box_breakout_batch_*.csv", recursive=True)
          failed_files = glob.glob("downloaded_artifacts/**/box_breakout_failed_batch_*.csv", recursive=True)
          summary_files = glob.glob("downloaded_artifacts/**/summary_batch_*.txt", recursive=True)

          # 合并命中结果
          if batch_files:
              dfs = []
              for f in batch_files:
                  if os.path.exists(f) and os.path.getsize(f) > 0:
                      try:
                          df = pd.read_csv(f)
                          dfs.append(df)
                      except Exception as e:
                          print(f"读取批次结果失败: {f} | {e}")

              if dfs:
                  out_df = pd.concat(dfs, ignore_index=True)
                  if not out_df.empty:
                      out_df = out_df.sort_values(
                          by=["window", "score", "breakout_pct_vs_upper", "inbox_ratio_pct"],
                          ascending=[False, False, False, False]
                      ).reset_index(drop=True)
                  out_df.to_csv("output/box_breakout_merged.csv", index=False, encoding="utf-8-sig")
              else:
                  pd.DataFrame().to_csv("output/box_breakout_merged.csv", index=False, encoding="utf-8-sig")
          else:
              pd.DataFrame().to_csv("output/box_breakout_merged.csv", index=False, encoding="utf-8-sig")

          # 合并失败记录
          if failed_files:
              dfs = []
              for f in failed_files:
                  if os.path.exists(f) and os.path.getsize(f) > 0:
                      try:
                          df = pd.read_csv(f)
                          dfs.append(df)
                      except Exception as e:
                          print(f"读取失败记录失败: {f} | {e}")

              if dfs:
                  failed_df = pd.concat(dfs, ignore_index=True)
                  failed_df.to_csv("output/box_breakout_failed_merged.csv", index=False, encoding="utf-8-sig")
              else:
                  pd.DataFrame().to_csv("output/box_breakout_failed_merged.csv", index=False, encoding="utf-8-sig")
          else:
              pd.DataFrame().to_csv("output/box_breakout_failed_merged.csv", index=False, encoding="utf-8-sig")

          # 合并 summary
          with open("output/run_summary_merged.txt", "w", encoding="utf-8") as f:
              if summary_files:
                  for sf in sorted(summary_files):
                      f.write(f"===== {os.path.basename(sf)} =====\n")
                      try:
                          with open(sf, "r", encoding="utf-8") as rf:
                              f.write(rf.read())
                      except Exception as e:
                          f.write(f"读取失败: {e}\n")
                      f.write("\n\n")
              else:
                  f.write("没有找到 summary 文件。\n")
          PY

      - name: Upload merged outputs
        uses: actions/upload-artifact@v4
        with:
          name: box-breakout-merged-results
          path: |
            output/box_breakout_merged.csv
            output/box_breakout_failed_merged.csv
            output/run_summary_merged.txt
